---
.prod-job:
  image: $VALIDATE_IMAGE
  resource_group: prod-registry
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - "departments/**/*.yaml"
      when: on_success
    - when: never
  tags:
    - infra
# 1. Resolve Digests
resolve-digests:
  stage: resolve
  extends: .prod-job
  before_script:
    - export DOCKER_CONFIG=$(mktemp -d)
    - export REGISTRY_AUTH_FILE="${DOCKER_CONFIG}/config.json"
    - |
      cat > "${DOCKER_CONFIG}/config.json" <<EOF
      {
        "auths": {
          "$PROXY_REGISTRY_HOST": {
            "username": "$PROXY_REGISTRY_USER",
            "password": "$PROXY_REGISTRY_PASS"
          }
        }
      }
      EOF
  script:
    - |
      if [ "${CI_DEBUG}" = "true" ]; then
        set -x
      fi
    - git config --global --add safe.directory '*'
    - DIFF_RANGE="HEAD~1..HEAD"
    - |
      resolve_proxy_url() {
        local src=$1; local host=$2
        if [[ "$src" != *"/"* ]]; then src="docker.io/library/$src"; elif [[ "$src" != *"."*/* ]]; then src="docker.io/$src"; fi
        local domain="${src%%/*}"; local path="${src#*/}"
        local env_var="PROXY_REGISTRY_MAPPING_${domain//./_}"; env_var="${env_var^^}"
        local proj=$(eval echo \$$env_var)
        if [ -z "$proj" ]; then echo "ERROR: No mapping for $domain" >&2; return 1; fi
        echo "${host}/${proj}/${path}"
      }
    - MODE=${INTERNAL_REGISTRY_PROJECT_MODE:-"hierarchical"}
    - IMAGE_FILES=$(git diff --name-only $DIFF_RANGE | grep "images.yaml" || true)
    - "> pipeline-manifest.txt"
    - |
      for f in $IMAGE_FILES; do
        if [ ! -f "$f" ]; then continue; fi # –Я—А–Њ–≤–µ—А–Ї–∞ –љ–∞ —Б–ї—Г—З–∞–є —Г–і–∞–ї–µ–љ–Є—П —Д–∞–є–ї–∞

        DIR_STRUCTURE=$(dirname "$f" | sed 's|^departments/||')
        #1. –Я–Њ–ї—Г—З–∞–µ–Љ —Б–њ–Є—Б–Њ–Ї –Т–°–Х–• –Њ–±—А–∞–Ј–Њ–≤ –Є–Ј —В–µ–Ї—Г—Й–µ–є –≤–µ—А—Б–Є–Є —Д–∞–є–ї–∞
        NEW_LIST=$(yq -r '.images[].source' "$f" | grep -v 'null' | sort)

        # 2. –Я–Њ–ї—Г—З–∞–µ–Љ —Б–њ–Є—Б–Њ–Ї –Њ–±—А–∞–Ј–Њ–≤ –Є–Ј –≤–µ—А—Б–Є–Є –Ф–Ю —Б–ї–Є—П–љ–Є—П (HEAD~1)
        # –Х—Б–ї–Є —Д–∞–є–ї –љ–Њ–≤—Л–є, OLD_LIST –±—Г–і–µ—В –њ—Г—Б—В—Л–Љ
        OLD_LIST=$(git show HEAD~1:"$f" 2>/dev/null | yq -r '.images[].source' 2>/dev/null | grep -v 'null' | sort || echo "")

        # 3. –Э–∞—Е–Њ–і–Є–Љ —В–Њ–ї—М–Ї–Њ —А–µ–∞–ї—М–љ–Њ –Э–Ю–Т–Ђ–Х —Б—В—А–Њ–Ї–Є (—В–µ, —З—В–Њ –µ—Б—В—М –≤ NEW, –љ–Њ –љ–µ—В –≤ OLD)
        # comm -13 —Г–і–∞–ї—П–µ—В –Ї–Њ–ї–Њ–љ–Ї—Г 1 (—В–Њ–ї—М–Ї–Њ –≤ OLD) –Є –Ї–Њ–ї–Њ–љ–Ї—Г 2 (–Њ–±—Й–Є–µ)
        SOURCES=$(comm -13 <(echo "$OLD_LIST") <(echo "$NEW_LIST"))

        if [ -z "$SOURCES" ]; then
          echo "No new images in $f"
          echo "SKIP_NEXT_STAGES=true" > skip.env
          exit 1
        fi

        for SRC in $SOURCES; do
          echo "Found new image: $SRC"

          PROXY_IMG=$(resolve_proxy_url "$SRC" "$PROXY_REGISTRY_HOST")

          # 1. –Я–Њ–ї—Г—З–∞–µ–Љ Digest –і–ї—П Pinning
          DIGEST=$(crane digest --platform linux/amd64 "$PROXY_IMG") || { echo "ERROR: Image pull failed: $PROXY_IMG"; exit 1; }

          # 2. –§–Њ—А–Љ–Є—А—Г–µ–Љ REPO@DIGEST
          PROXY_REPO=${PROXY_IMG%%:*}
          PROXY_REF="${PROXY_REPO}@${DIGEST}"

          # 3. –§–Њ—А–Љ–Є—А—Г–µ–Љ Target
          NAME=${SRC##*/}; NAME=${NAME%%:*}; TAG=${SRC##*:}

          if [ "$MODE" = "hierarchical" ]; then
            INTERNAL_TARGET="${INTERNAL_REGISTRY_HOST}/${DIR_STRUCTURE}/${NAME}:${TAG}"
          else
            INTERNAL_TARGET="${INTERNAL_REGISTRY_HOST}/${MODE}/${DIR_STRUCTURE}/${NAME}:${TAG}"
          fi

          CURRENT_INTERNAL_DIGEST=$(crane digest --platform linux/amd64 "$INTERNAL_TARGET" 2>/dev/null || echo "")
          if [ "$CURRENT_INTERNAL_DIGEST" = "$DIGEST" ]; then
            echo "SKIP: $INTERNAL_TARGET already exists"
          else
            echo "UPDATE: $INTERNAL_TARGET"
            echo "${PROXY_REF}|${INTERNAL_TARGET}|${DIGEST}" >> pipeline-manifest.txt
          fi
        done
      done
  allow_failure: true
  artifacts:
    when: always
    reports:
      dotenv: skip.env
    paths:
      - pipeline-manifest.txt
      - skip.env
    expire_in: 10 minutes

# 3. Push
push-internal:
  stage: push
  extends: .prod-job
  needs:
    - resolve-digests
  variables:
    COSIGN_REPOSITORY: ${COSIGN_QARANTINE}
  before_script:
    - unset DOCKER_AUTH_CONFIG
    - export DOCKER_CONFIG=$(mktemp -d)
    - export REGISTRY_AUTH_FILE="${DOCKER_CONFIG}/config.json"
    - |
      cat > "${DOCKER_CONFIG}/config.json" <<EOF
      {
        "auths": {
          "$PROXY_REGISTRY_HOST": {
            "username": "$PROXY_REGISTRY_USER",
            "password": "$PROXY_REGISTRY_PASS"
          },
          "$INTERNAL_REGISTRY_HOST": {
            "username": "$INTERNAL_REGISTRY_USER",
            "password": "$INTERNAL_REGISTRY_PASS"
          }
        }
      }
      EOF
  script:
    - |
      if [ "${CI_DEBUG}" = "true" ]; then
        set -x
      fi
    - |
      if [ "$SKIP_NEXT_STAGES" = "true" ]; then
        echo "Bypassing sync as requested."
        exit 0
      fi
    - |
      if [ -n "$COSIGN_VAULT_URL" ]; then
        echo "рЯФР Using HashiCorp Vault for signing..."
        export VAULT_ADDR=$COSIGN_VAULT_URL
        export TRANSIT_SECRET_ENGINE_PATH=${COSIGN_VAULT_PATH}
        KEY_URI="hashivault://${COSIGN_KEY}"
      else
        echo "рЯФР Using Private Key file..."
        echo "$COSIGN_KEY" > /tmp/cosign.key
        KEY_URI="/tmp/cosign.key"
      fi
    - |
      while IFS='|' read -r PROXY_REF TARGET DIGEST; do
        $(cosign verify --key ${KEY_URI} \
          --insecure-ignore-tlog=true \
          --insecure-ignore-sct=true \
          "${PROXY_REF}" > /dev/null) || { echo "вЭМ ERROR: Image $PROXY_REF not verified"; exit 1; }

          echo "вЬУ Image verified"
          echo "рЯУ¶ Copy: $PROXY_REF вЖТ $TARGET"
          crane copy --platform linux/amd64 "$PROXY_REF" "$TARGET"

      done < pipeline-manifest.txt

# 4. Sign
sign-internal:
  stage: sign
  extends: .prod-job
  needs:
    - resolve-digests
    - push-internal
  before_script:
    - unset DOCKER_AUTH_CONFIG
    - export DOCKER_CONFIG=$(mktemp -d)
    - export REGISTRY_AUTH_FILE="${DOCKER_CONFIG}/config.json"
    - |
      cat > "${DOCKER_CONFIG}/config.json" <<EOF
      {
        "auths": {
          "$INTERNAL_REGISTRY_HOST": {
            "username": "$INTERNAL_REGISTRY_USER",
            "password": "$INTERNAL_REGISTRY_PASS"
          }
        }
      }
      EOF
  script:
    - |
      if [ "${CI_DEBUG}" = "true" ]; then
        set -x
      fi
    - |
      if [ "$SKIP_NEXT_STAGES" = "true" ]; then
        echo "Bypassing sync as requested."
        exit 0
      fi
    - |
      if [ -n "$COSIGN_VAULT_URL" ]; then
        echo "рЯФР Using HashiCorp Vault for signing..."
        export VAULT_ADDR=$COSIGN_VAULT_URL
        export TRANSIT_SECRET_ENGINE_PATH=${COSIGN_VAULT_PATH}
        KEY_URI="hashivault://${COSIGN_KEY}"
      else
        echo "рЯФР Using Private Key file..."
        echo "$COSIGN_KEY" > /tmp/cosign.key
        KEY_URI="/tmp/cosign.key"
      fi
    - |
      while IFS='|' read -r PROXY_REF TARGET DIGEST; do
        echo "вЬНпЄП Signing: $TARGET"
        cosign sign --key ${KEY_URI} \
          -a "git.commit.sha=${CI_COMMIT_SHA}" \
          -a "git.branch=${CI_COMMIT_REF_NAME}" \
          -a "gitlab.pipeline.url=${CI_PIPELINE_URL}" \
          --tlog-upload=false \
          --new-bundle-format=false --use-signing-config=false -y \
          "${TARGET}@${DIGEST}" > /dev/null
        # –Я—А–Њ–≤–µ—А—П–µ–Љ –њ–Њ–і–њ–Є—Б—М
        cosign verify --key ${KEY_URI} \
          --insecure-ignore-tlog=true \
          --insecure-ignore-sct=true \
          "${TARGET}" > /dev/null
        echo "вЬУ Image verified"
      done < pipeline-manifest.txt
